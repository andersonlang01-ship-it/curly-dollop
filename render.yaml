services:
  # Backend API (Node.js)
  - type: web
    name: backend-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: site-db
          property: connectionString

  # Frontend (HTML/CSS/JS)
  - type: web
    name: frontend
    runtime: static
    buildCommand: ""
    staticPublishPath: public
    envVars:
      - key: API_URL
        value: https://backend-api.onrender.com

databases:
  - name: site-db
    plan: free